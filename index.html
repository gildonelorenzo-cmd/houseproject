<style>
/* ===== ORIGINAL STYLES KEPT ===== */
body {
  margin:0;
  font-family:Arial, sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  overflow-x:hidden;
  background: linear-gradient(270deg,#f3d1a8,#fed6e3,#a8edea,#f3d1a8);
  background-size:800% 800%;
  animation:gradientShift 20s linear infinite;
}

@keyframes gradientShift {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

body.dark{
  color:#f0f0f0;
  background: linear-gradient(270deg,#0f2027,#203a43,#2c5364,#0f2027);
  background-size:800% 800%;
}

/* CHRISTMAS */
body.christmas{
  background:#B30000 !important;
}

/* CHINESE NEW YEAR */
body.cny{
  background:#8B0000 !important;
  color:#FFD700;
}

body.cny .team-card{
  background:rgba(139,0,0,0.95)!important;
  color:#FFD700!important;
  border:3px solid #FFD700!important;
  box-shadow:0 0 25px rgba(255,215,0,0.7);
}

/* MODE BUTTON */
#mode-toggle{
  position:fixed;
  top:20px;
  left:20px;
  width:55px;
  height:55px;
  border-radius:50%;
  font-size:26px;
  cursor:pointer;
  z-index:50;
}

/* LEADERBOARD */
#leaderboard{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:30px;
  margin-top:60px;
  margin-bottom:120px;
}

.team-card{
  background:white;
  border-radius:15px;
  padding:10px;
  text-align:center;
  width:180px;
  box-shadow:0 8px 15px rgba(0,0,0,0.12);
}

.rank-label{font-size:20px;font-weight:bold;}
.score{font-size:22px;font-weight:bold;}

/* SNOW */
#snow-canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:10;
}

/* DRAGON */
#dragon{
  position:fixed;
  width:280px;
  display:none;
  pointer-events:none;
  z-index:20;
}
</style>
</head>

<body>

<button id="mode-toggle">🌙</button>
<canvas id="snow-canvas"></canvas>

<img id="dragon"
src="project/chinese-dragon-flying-clouds-isolated-white-background_1308-63432-Photoroom.png">

<div id="leaderboard"></div>

<script>
/* ===== LEADERBOARD ===== */
let teams=[
  {id:"acrobats",name:"Acrobats",color:"#59b300",score:0},
  {id:"quicksilver",name:"Quicksilver",color:"#ff4d4d",score:0},
  {id:"druids",name:"Druids",color:"#0073e6",score:0},
  {id:"bravehearts",name:"Bravehearts",color:"#ffcc00",score:0}
];

function renderLeaderboard(){
  const container=document.getElementById("leaderboard");
  container.innerHTML="";
  teams.sort((a,b)=>b.score-a.score);
  teams.forEach((team,index)=>{
    const card=document.createElement("div");
    card.className="team-card";
    card.style.border="3px solid "+team.color;
    card.innerHTML=`
      <div class="rank-label">#${index+1}</div>
      <h3>${team.name}</h3>
      <p class="score">${team.score} pts</p>
    `;
    container.appendChild(card);
  });
}

/* ===== SNOW SYSTEM RESTORED ===== */
const canvas=document.getElementById("snow-canvas");
const ctx=canvas.getContext("2d");
let cw,ch,snowflakes=[],animFrame;

function resize(){
  cw=canvas.width=window.innerWidth;
  ch=canvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

function createSnowflake(){
  return{
    x:Math.random()*cw,
    y:Math.random()*ch,
    r:Math.random()*3+1,
    speed:Math.random()*2+1
  };
}

function updateSnow(){
  ctx.clearRect(0,0,cw,ch);
  snowflakes.forEach(f=>{
    f.y+=f.speed;
    if(f.y>ch) f.y=0;
    ctx.beginPath();
    ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  });
  animFrame=requestAnimationFrame(updateSnow);
}

function startSnow(){
  snowflakes=[];
  for(let i=0;i<300;i++) snowflakes.push(createSnowflake());
  updateSnow();
}

function stopSnow(){
  cancelAnimationFrame(animFrame);
  ctx.clearRect(0,0,cw,ch);
}

/* ===== DRAGON SYSTEM ===== */
let dragonInterval;

function startCNYMode(){
  const dragon=document.getElementById("dragon");
  dragon.style.display="block";
  moveDragon();
  dragonInterval=setInterval(moveDragon,9000);
}

function stopCNYMode(){
  const dragon=document.getElementById("dragon");
  dragon.style.display="none";
  clearInterval(dragonInterval);
}

function moveDragon(){
  const dragon=document.getElementById("dragon");
  const fromLeft=Math.random()>0.5;
  const startX=fromLeft?-400:window.innerWidth+400;
  const endX=fromLeft?window.innerWidth+400:-400;
  const randomY=Math.random()*(window.innerHeight-300);

  dragon.style.top=randomY+"px";
  dragon.style.left=startX+"px";
  dragon.style.transition="none";
  dragon.style.transform=fromLeft?"scaleX(1)":"scaleX(-1)";

  setTimeout(()=>{
    dragon.style.transition="left 7s linear";
    dragon.style.left=endX+"px";
  },200);
}

/* ===== MODE SWITCH ===== */
let currentMode="light";
const modeBtn=document.getElementById("mode-toggle");

function applyMode(mode){
  currentMode=mode;
  document.body.classList.remove("dark","christmas","cny");
  stopSnow();
  stopCNYMode();

  if(mode==="dark"){
    document.body.classList.add("dark");
    modeBtn.textContent="🎅";
  }
  else if(mode==="christmas"){
    document.body.classList.add("christmas");
    startSnow();
    modeBtn.textContent="🐉";
  }
  else if(mode==="cny"){
    document.body.classList.add("cny");
    startCNYMode();
    modeBtn.textContent="☀️";
  }
  else{
    modeBtn.textContent="🌙";
  }
}

modeBtn.addEventListener("click",()=>{
  if(currentMode==="light") applyMode("dark");
  else if(currentMode==="dark") applyMode("christmas");
  else if(currentMode==="christmas") applyMode("cny");
  else applyMode("light");
});

renderLeaderboard();
applyMode("light");
</script>

</body>
</html>
